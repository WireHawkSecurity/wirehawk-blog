{{- if and .IsPage (eq .Section "posts") }}
<div class="reading-progress" id="reading-progress"></div>
<div class="lightbox-overlay" id="lightbox-overlay" role="dialog" aria-label="Image preview" aria-hidden="true">
  <img id="lightbox-img" src="" alt="">
</div>
<script>
(function () {
  // Reading progress bar
  var bar = document.getElementById('reading-progress');
  if (bar) {
    window.addEventListener('scroll', function () {
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      if (docHeight > 0) {
        bar.style.width = (window.scrollY / docHeight * 100) + '%';
      }
    }, { passive: true });
  }

  // Auto-open TOC on desktop where fixed sidebar is active
  if (window.innerWidth >= 1440) {
    var tocEl = document.querySelector('details.toc');
    if (tocEl) tocEl.setAttribute('open', '');
  }

  // ToC scroll-spy: highlights the active section as the reader scrolls
  (function () {
    var tocInner = document.querySelector('details.toc .inner');
    if (!tocInner) return;

    var links = tocInner.querySelectorAll('a[href^="#"]');
    if (!links.length) return;

    var sections = [];
    links.forEach(function (link) {
      var id = link.getAttribute('href');
      if (!id || id.length < 2) return;
      var el = document.getElementById(id.slice(1));
      if (el) sections.push({ link: link, el: el });
    });

    if (!sections.length) return;

    // Distance from the top of the viewport at which a heading counts as current.
    var TRIGGER = 120;

    function setActive(current) {
      for (var i = 0; i < sections.length; i++) {
        sections[i].link.classList.toggle('active', sections[i] === current);
      }
    }

    function update() {
      var maxScroll = document.documentElement.scrollHeight - window.innerHeight;

      // Active section = the last heading whose top has passed the trigger line.
      // getBoundingClientRect stays accurate regardless of layout shifts, image
      // loads, or a future sticky header.
      var current = sections[0];
      for (var i = 0; i < sections.length; i++) {
        if (sections[i].el.getBoundingClientRect().top <= TRIGGER) {
          current = sections[i];
        }
      }

      // Bottom-of-page guard: the final heading often sits within the last
      // viewport height, so it can never scroll up to the trigger line. Once the
      // reader reaches the end of a scrollable page, force the last section
      // active so the ToC still reflects where they are (e.g. Final Thoughts).
      if (maxScroll > 0 && window.scrollY >= maxScroll - 2) {
        current = sections[sections.length - 1];
      }

      setActive(current);
    }

    var ticking = false;
    function onScroll() {
      if (!ticking) {
        requestAnimationFrame(function () {
          update();
          ticking = false;
        });
        ticking = true;
      }
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll, { passive: true });
    // Recompute once images finish loading, since they shift heading positions.
    window.addEventListener('load', update);

    update();
  })();

  // Image lightbox
  var overlay = document.getElementById('lightbox-overlay');
  var lbImg = document.getElementById('lightbox-img');
  if (overlay && lbImg) {
    function openLightbox(src, alt) {
      lbImg.src = src;
      lbImg.alt = alt;
      overlay.classList.add('active');
      overlay.setAttribute('aria-hidden', 'false');
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      overlay.classList.remove('active');
      overlay.setAttribute('aria-hidden', 'true');
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
    }

    document.querySelectorAll('.post-content p > img').forEach(function (img) {
      img.addEventListener('click', function () {
        openLightbox(img.src, img.alt);
      });
    });

    overlay.addEventListener('click', closeLightbox);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && overlay.classList.contains('active')) {
        closeLightbox();
      }
    });
  }

  // Subscribe CTA on post pages
  if (window.location.pathname.indexOf('/posts/') !== -1) {
    var postContent = document.querySelector('.post-content');
    if (postContent) {
      var cta = document.createElement('div');
      cta.className = 'subscribe-cta';
      cta.innerHTML = 'Never miss a post. <a href="/subscribe/">Subscribe for updates</a>.';
      postContent.appendChild(cta);
    }
  }
})();
</script>
{{- end }}

<script>
window.addEventListener('pageshow', function (e) {
  if (e.persisted) window.scrollTo(0, 0);
});
</script>
